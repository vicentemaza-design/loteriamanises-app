<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />
    <meta name="description" content="Lotería Manises — Administración de Loterías nº 3. Compra tus loterías online con total seguridad. Euromillones, Primitiva, Bonoloto y más." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lotería Manises" />
    <link rel="manifest" href="/manifest.json" />
    <title>Lotería Manises — Administración nº 3</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      (function () {
        var path = window.location.pathname;
        var isAuthRoute =
          path === '/login' ||
          path === '/register' ||
          path.startsWith('/login/') ||
          path.startsWith('/register/');

        if (isAuthRoute) {
          document.documentElement.classList.add('auth-route');
        }
      })();
    </script>
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
